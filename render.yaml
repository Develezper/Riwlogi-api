services:
  - type: web
    name: riwlogi-classifier
    runtime: python
    region: oregon   # cámbialo a "frankfurt" si quieres Europa
    plan: free       # cámbialo a "starter" para producción real

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: OPENAI_API_KEY
        sync: false          # Render te pedirá el valor manualmente (no queda en el repo)
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGINS
        value: "*"
      # PORT lo inyecta Render automáticamente, no lo pongas tú
